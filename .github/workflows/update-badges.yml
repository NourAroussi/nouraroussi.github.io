name: Update Credly Badges

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:  # Manual trigger

jobs:
  update-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Fetch badges from Credly
        run: |
          curl -sf -H 'Accept: application/json' -H 'User-Agent: Mozilla/5.0' 'https://www.credly.com/users/nouraroussi/badges.json' -o /tmp/badges.json || { echo "Credly API request failed"; exit 1; }
          python3 << 'EOF'
          import json, sys, re
          from datetime import date

          with open('/tmp/badges.json', 'r') as f:
              raw = f.read()
          try:
              data = json.loads(raw)
          except json.JSONDecodeError:
              print(f"Failed to parse Credly response: {raw[:500]}")
              sys.exit(1)

          if 'data' not in data:
              print(f"Unexpected response structure: {list(data.keys())}")
              sys.exit(1)

          today = date.today().isoformat()

          # Certs display — NO stackable
          certs_badges = [b for b in data['data']
                    if 'Stackable' not in b['badge_template']['name']
                    and (not b.get('expires_at_date') or b['expires_at_date'] >= today)]

          # Floating background — ALL badges including stackable
          all_badges = [b for b in data['data']
                    if not b.get('expires_at_date') or b['expires_at_date'] >= today]

          def get_priority(name):
              # Cloud Quest must be checked BEFORE Cloud Practitioner
              if 'Quest' in name or 'Industry Quest' in name:
                  return 70

              # Expert / Professional level
              expert = {
                  'CISSP': 1,
                  'Solutions Architect – Professional': 2,
                  'Security – Specialty': 3,
                  'GCIH': 4,
                  'SecurityX': 5,
                  'CySA+': 6, 'PenTest+': 7,
              }
              for key, val in expert.items():
                  if key in name:
                      return val

              # Fortinet Associate → associate tier (next to PCAP)
              if 'Fortinet' in name and 'Associate' in name:
                  return 25

              # Associate level (fixed order — new certs append at end of tier)
              associate = {
                  'Solutions Architect – Associate': 20, 'CloudOps': 21, 'Developer – Associate': 22,
                  'CCNA': 23, 'PCAP': 24,
                  'Cloud+': 26, 'Linux+': 27, 'Server+': 28, 'SecAI+': 29,
                  'GSEC': 30, 'GFACT': 31,
              }
              for key, val in associate.items():
                  if key in name:
                      return val

              # Fortinet Fundamentals → foundational tier
              if 'Fortinet' in name and 'Fundamentals' in name:
                  return 46

              # Foundational level
              foundational = {
                  'Cloud Practitioner': 40, 'AI Practitioner': 41,
                  'Security+': 42, 'Network+': 43, 'A+ ce': 44,
              }
              for key, val in foundational.items():
                  if key in name:
                      return val

              if 'Cybersecurity (CC)' in name:
                  return 50
              if 'Well-Architected' in name:
                  return 75
              if 'Academic' in name or 'Qualifications' in name:
                  return 99
              # Unknown new certs → end of associate tier (won't displace existing order)
              return 35

          # Build sorted cert entries (no stackable)
          entries = []
          for b in certs_badges:
              name = b['badge_template']['name']
              img = b['image_url']
              url = f"https://www.credly.com/badges/{b['id']}/public_url"
              issued = b.get('issued_at_date', '')
              short = name.replace(' Stackable Certification', '').replace(' ce Certification', '').replace(' - Training Badge', '').replace('Certified ', '').replace('CompTIA ', '').replace('AWS ', '')
              entries.append((get_priority(name), short, img, url, issued))

          entries.sort(key=lambda x: x[0])

          # Build floating badges (ALL including stackable)
          all_imgs = [b['image_url'] for b in all_badges]

          # Generate JS array for certs
          js_lines = []
          for _, name, img, url, issued in entries:
              js_lines.append(f'            {{ name: "{name}", img: "{img}", url: "{url}", date: "{issued}" }},')
          js_certs = '\n'.join(js_lines)

          # Generate floating badges array (all badges)
          bg_lines = [f'            "{img}"' for img in all_imgs]
          js_bg = ',\n'.join(bg_lines)

          # Read index.html
          with open('index.html', 'r') as f:
              html = f.read()

          # Replace certs array
          html = re.sub(
              r'(const certs = \[)\n.*?(\n        \];)',
              f'\\1\n{js_certs}\n        ];',
              html, flags=re.DOTALL
          )

          # Replace floating badges array
          html = re.sub(
              r'(const badges = \[)\n.*?(\n        \];)',
              f'\\1\n{js_bg}\n        ];',
              html, flags=re.DOTALL
          )

          # Update count
          html = re.sub(r'const count = \d+;', f'const count = {len(all_imgs)};', html)

          # Ensure initial certs display shows 8
          html = re.sub(r'certs\.slice\(0,\s*\d+\)', 'certs.slice(0, 8)', html)

          with open('index.html', 'w') as f:
              f.write(html)

          print(f"Certs displayed: {len(entries)}")
          print(f"Floating background: {len(all_imgs)} (includes stackable)")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || (git commit -m "Update Credly badges [auto]" && git push)
